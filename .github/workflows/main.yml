name: etl pipeline
on:
    push:
        branches:
            - main
jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v2
            - name: Runjob1.py
              run: python job1.py
    job2:
        runs-on: ubuntu-latest
        needs: job1
        steps:
            - name: Checout Code
              uses: actions/checkout@v2
            - name:Run job2.py
              run: python job2.py
    job3:
        runs-on: ubuntu-latest
        needs: job1
        steps:
            - name: Checout Code
              uses: actions/checkout@v2
            - name: Run job3.py
              run: python job3.py

    job4:
        runs-on: ubuntu-latest
        needs: job2
        steps:
            - name: Checout Code
              uses: actions/checkout@v2
            - name:Run job4.py
              run:python job4.py

    job5:
        runs-on: ubuntu-latest
        needs: job3
        steps:
            - name: Checout Code
              uses: actions/checkout@v2
            - name:Run job4.py
              run:python job4.py

    job6:
        runs-on: ubuntu-latest
        needs: [job4,job5]
        steps:
            - name: Checout Code
              uses: actions/checkout@v2
            - name:Run job6.py
              run:python job6.py                        
            
    